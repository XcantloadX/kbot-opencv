name: Build & Test PySide6 Slim Wheels

on:
  workflow_dispatch:
    inputs:
      pyside6_version:
        description: PySide6 version to slim
        default: "6.8.0"
        type: string
      skip_test:
        description: Skip testing after build
        default: false
        type: boolean

env:
  PYSIDE6_VERSION: ${{ inputs.pyside6_version || '6.8.0' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # PySide6_Essentials uses cp39-abi3 stable-ABI wheels on both platforms,
          # so a single Python version per OS produces the correct universal wheel.
          - os: ubuntu-22.04
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.11'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install wheel

      - name: Build slim PySide6 wheel
        run: python pyside6/build_pyside6.py
        env:
          PYSIDE6_VERSION: ${{ env.PYSIDE6_VERSION }}
          PYTHONIOENCODING: utf-8

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyside6-slim-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/
          if-no-files-found: error

  test:
    if: ${{ !inputs.skip_test }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.11'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1 libegl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon0 libfontconfig1 libfreetype6

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyside6-slim-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist

      - name: Test PySide6 slim wheel
        run: python pyside6/test_pyside6.py "dist/*.whl"
        env:
          QT_QPA_PLATFORM: offscreen

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload wheels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="pyside6-slim-v${{ env.PYSIDE6_VERSION }}-build-${{ github.run_id }}"
          gh release create "$TAG_NAME" \
            --title "PySide6 ${{ env.PYSIDE6_VERSION }} Slim Wheels" \
            --notes "Slimmed PySide6 wheel — retains only QtCore, QtGui, QtWidgets, QtQml, QtQuick, QtQuickControls2, QtSvg. Build from workflow run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            artifacts/**/*.whl
